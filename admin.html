<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login - LION CREDIT</title>

<style>
body{
  font-family: Arial;
  background:#0b0f19;
  color:white;
  text-align:center;
  padding:40px;
}

.box{
  background:#111827;
  width:320px;
  margin:auto;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#1f2937;
  padding:10px;
  margin:10px;
  border-radius:10px;
  text-align:left;
}

.hidden{display:none;}
</style>
</head>

<body>

<h1>🔐 ADMIN LOGIN</h1>

<div id="loginBox" class="box">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
  <h2>📊 Applications</h2>
  <div id="list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "lion-credit-system.firebaseapp.com",
  projectId: "lion-credit-system"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 LOGIN
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(()=>{
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").classList.remove("hidden");
    loadData();
  })
  .catch(err=>{
    alert(err.message);
  });
}

// 🔒 CHECK LOGIN STATE
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").classList.remove("hidden");
    loadData();
  }
});

// 📊 LOAD DATA
function loadData(){
  db.collection("submissions").orderBy("time","desc")
  .onSnapshot(snap=>{
    let html="";

    snap.forEach(doc=>{
      let d = doc.data();

      html += `
      <div class="card">
        <b>Name:</b> ${d.name}<br>
        <b>Phone:</b> ${d.phone}<br>
        <b>Email:</b> ${d.email}<br>
        <b>IC:</b> ${d.icnumber}<br>
        <b>Loan:</b> ${d.amount}<br>
      </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });
}
</script>

</body>
</html>

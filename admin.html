<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="firebase.js"></script>

<style>
body{background:#0a0f1c;color:white;font-family:Arial;margin:0;display:flex;}
.sidebar{width:200px;background:#111827;height:100vh;padding:20px;}
.main{flex:1;padding:20px;}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:#111827;}
td,th{padding:10px;border-bottom:1px solid #222;text-align:center;}
button{padding:6px;border:none;border-radius:5px;cursor:pointer;}
.approve{background:green;color:white;}
.reject{background:red;color:white;}
.delete{background:gray;color:white;}
img{width:60px;border-radius:6px;}
</style>
</head>

<body>

<div class="sidebar">
<h3>Admin</h3>
</div>

<div class="main">

<div class="card">
<h2>Applications</h2>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

let all=[];
let chart=null;

auth.onAuthStateChanged(u=>{
if(u) load();
});

async function load(){

const snap=await db.collection("applications")
.orderBy("created","desc")
.get();

all=[];
snap.forEach(d=>all.push({id:d.id,...d.data()}));

render();
}

function render(){

let p=0,a=0,r=0;
let html="";

all.forEach(d=>{

if(d.status=="Pending")p++;
if(d.status=="Approved")a++;
if(d.status=="Rejected")r++;

html+=`
<tr>
<td>${d.name||""}</td>
<td>${d.phone||""}</td>
<td>${d.amount||""}</td>
<td>${d.status||""}</td>

<td>
<button class="approve" onclick="setStatus('${d.id}','Approved')">A</button>
<button class="reject" onclick="setStatus('${d.id}','Rejected')">R</button>
<button class="delete" onclick="del('${d.id}')">X</button>
</td>
</tr>
`;
});

document.getElementById("table").innerHTML=html;

draw(p,a,r);
}

async function setStatus(id,status){
await db.collection("applications").doc(id).update({status});
load();
}

async function del(id){
await db.collection("applications").doc(id).delete();
load();
}

function draw(p,a,r){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Pending","Approved","Rejected"],
datasets:[{
data:[p,a,r]
}]
}
});

}

</script>

</body>
</html>

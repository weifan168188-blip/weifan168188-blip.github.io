<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin V8 FIX</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#111827;
padding:20px;
height:100vh;
}

.main{
flex:1;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#111827;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}

img{width:50px;border-radius:5px;cursor:pointer;}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.modal img{max-width:80%;}

</style>
</head>

<body>

<div class="sidebar">
<h3>V8 BANK</h3>
</div>

<div class="main">

<div class="card">
<h2>Applications</h2>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

</div>

<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="img">
</div>

<script>

let chart;

auth.onAuthStateChanged(u=>{
if(u) load();
});

async function load(){

const snap=await db.collection("applications")
.orderBy("created","desc")
.get();

let data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));

render(data);
}

function render(data){

let h="";
let p=0,a=0,r=0;

data.forEach(d=>{

if(d.status==="Pending")p++;
if(d.status==="Approved")a++;
if(d.status==="Rejected")r++;

let risk=d.risk||0;

h+=`
<tr>
<td>${d.name||""}</td>
<td>${d.phone||""}</td>
<td>${d.amount||""}</td>
<td>${d.status}</td>
<td>${risk}</td>
<td>
<button class="approve" onclick="update('${d.id}','Approved')">A</button>
<button class="reject" onclick="update('${d.id}','Rejected')">R</button>
</td>
</tr>
`;
});

tb.innerHTML=h;

draw(p,a,r);
}

async function update(id,status){

await db.collection("applications").doc(id).update({
status
});

load();
}

function draw(p,a,r){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Pending","Approved","Rejected"],
datasets:[{data:[p,a,r]}]
}
});

}

</script>

</body>
</html>

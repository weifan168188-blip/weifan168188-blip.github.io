<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT ADMIN V3</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
}

/* LEFT SIDEBAR */
.sidebar{
width:240px;
background:#0f1629;
height:100vh;
padding:20px;
box-sizing:border-box;
}

.sidebar h2{
color:#d4af37;
text-align:center;
}

.menu button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#141b2d;
color:white;
cursor:pointer;
}

.menu button:hover{
background:#d4af37;
color:black;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOP STATS */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#141b2d;
padding:15px;
border-radius:15px;
text-align:center;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#141b2d;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #222;
text-align:center;
}

th{
background:#111827;
color:#d4af37;
}

/* STATUS */
.status{
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

.Pending{background:orange;color:black;}
.Approved{background:green;}
.Rejected{background:red;}

/* IMAGE */
img{
width:70px;
border-radius:8px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal img{
width:400px;
border-radius:10px;
}

input{
padding:10px;
width:300px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🦁 LION ADMIN</h2>

<div class="menu">
<button onclick="loadData()">📋 All Applications</button>
<button onclick="logout()">🚪 Logout</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- STATS -->
<div class="stats">
<div class="card">Total<br><span id="total">0</span></div>
<div class="card">Pending<br><span id="pending">0</span></div>
<div class="card">Approved<br><span id="approved">0</span></div>
<div class="card">Rejected<br><span id="rejected">0</span></div>
</div>

<input id="search" placeholder="Search name or phone..." onkeyup="loadData()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Loan</th>
<th>Amount</th>
<th>Status</th>
<th>IC Front</th>
<th>IC Back</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>

auth.onAuthStateChanged(user=>{
if(user){
loadData();
}
});

function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function logout(){
auth.signOut();
location.reload();
}

async function loadData(){

const search=document.getElementById("search").value.toLowerCase();

const snapshot=await db.collection("submissions").get();

let total=0,pending=0,approved=0,rejected=0;

let html="";

snapshot.forEach(doc=>{

const d=doc.data();

if(search &&
!(d.name?.toLowerCase().includes(search) ||
d.phone?.includes(search))){
return;
}

total++;

if(d.status=="Pending")pending++;
if(d.status=="Approved")approved++;
if(d.status=="Rejected")rejected++;

html+=`
<tr>
<td>${d.name||""}</td>
<td>${d.phone||""}</td>
<td>${d.loantype||""}</td>
<td>${d.amount||""}</td>

<td><span class="status ${d.status}">${d.status}</span></td>

<td>
${d.frontURL?`<img onclick="openImg('${d.frontURL}')" src="${d.frontURL}">`:""}
</td>

<td>
${d.backURL?`<img onclick="openImg('${d.backURL}')" src="${d.backURL}">`:""}
</td>

<td>
<button onclick="updateStatus('${doc.id}','Approved')">✔</button>
<button onclick="updateStatus('${doc.id}','Rejected')">✖</button>
<button onclick="deleteRecord('${doc.id}')">🗑</button>
</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML=html;

document.getElementById("total").innerText=total;
document.getElementById("pending").innerText=pending;
document.getElementById("approved").innerText=approved;
document.getElementById("rejected").innerText=rejected;

}

async function updateStatus(id,status){
await db.collection("submissions").doc(id).update({status});
loadData();
}

async function deleteRecord(id){
if(confirm("Delete record?")){
await db.collection("submissions").doc(id).delete();
loadData();
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT V8 ADMIN</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="firebase.js"></script>

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:Arial;
display:flex;
background:url('hero-bg.jpg') no-repeat center/cover;
color:white;
}

/* dark overlay */
.overlay{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
z-index:-1;
}

/* ===== SIDEBAR ===== */
.sidebar{
width:240px;
height:100vh;
background:rgba(15,23,42,.95);
padding:20px;
backdrop-filter:blur(10px);
}

.logo{
width:100%;
text-align:center;
margin-bottom:20px;
}

.logo img{
width:80px;
border-radius:12px;
}

.menu div{
padding:12px;
margin:8px 0;
background:#111827;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{
background:#1f2937;
}

/* ===== MAIN ===== */
.main{
flex:1;
padding:20px;
}

/* ===== CARDS ===== */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.card{
background:rgba(17,24,39,.9);
padding:15px;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* ===== TABLE ===== */
table{
width:100%;
border-collapse:collapse;
background:rgba(17,24,39,.9);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #1f2937;
}

img{
width:50px;
border-radius:6px;
cursor:pointer;
}

/* ===== BUTTONS ===== */
button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{background:#16a34a;color:white;}
.reject{background:#dc2626;color:white;}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
}

.modal img{
max-width:80%;
border-radius:10px;
}

h1{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="logo.jpg">
<h3>LION ADMIN</h3>
</div>

<div class="menu">
<div onclick="load()">All Applications</div>
<div onclick="filterStatus('Pending')">Pending</div>
<div onclick="filterStatus('Approved')">Approved</div>
<div onclick="filterStatus('Rejected')">Rejected</div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<h1>📊 Applications Dashboard V8</h1>

<div class="cards">
<div class="card">Total: <span id="t"></span></div>
<div class="card">Pending: <span id="p"></span></div>
<div class="card">Approved: <span id="a"></span></div>
<div class="card">Rejected: <span id="r"></span></div>
</div>

<canvas id="chart"></canvas>

<br>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Risk</th>
<th>Front</th>
<th>Back</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tb"></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>

let all=[];
let chart;
let statusFilter="all";

auth.onAuthStateChanged(u=>{
if(u) load();
});

async function load(){

const snap=await db.collection("applications")
.orderBy("created","desc")
.get();

all=[];
snap.forEach(d=>all.push({id:d.id,...d.data()}));

render(all);
}

function filterStatus(s){
statusFilter=s;
render(all);
}

function render(data){

let t=0,p=0,a=0,r=0;

let rows="";

data.forEach(d=>{

if(statusFilter!=="all" && d.status!==statusFilter) return;

t++;
if(d.status==="Pending")p++;
if(d.status==="Approved")a++;
if(d.status==="Rejected")r++;

rows+=`
<tr>
<td>${d.name||""}</td>
<td>${d.phone||""}</td>
<td>${d.amount||""}</td>
<td>${d.status||"Pending"}</td>
<td>${d.risk||0}</td>

<td><img src="${d.frontURL||''}" onclick="openImg('${d.frontURL}')"></td>
<td><img src="${d.backURL||''}" onclick="openImg('${d.backURL}')"></td>

<td>
<button class="approve" onclick="update('${d.id}','Approved')">✔</button>
<button class="reject" onclick="update('${d.id}','Rejected')">✖</button>
</td>
</tr>
`;
});

tb.innerHTML=rows;

document.getElementById("t").innerText=t;
document.getElementById("p").innerText=p;
document.getElementById("a").innerText=a;
document.getElementById("r").innerText=r;

draw(p,a,r);
}

async function update(id,status){

await db.collection("applications").doc(id).update({
status
});

load();
}

function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function draw(p,a,r){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Pending","Approved","Rejected"],
datasets:[{
data:[p,a,r]
}]
}
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body{font-family:Arial;background:#0b0f19;color:white;padding:20px;}
    input,button{padding:10px;margin:5px;width:300px;}
    table{width:100%;margin-top:20px;border-collapse:collapse;}
    td,th{border:1px solid #333;padding:8px;}
    .box{display:none;}
  </style>
</head>
<body>

<h2>🔐 Admin Login</h2>

<div id="loginBox">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="panel" class="box">

  <h2>📊 Submissions</h2>
  <button onclick="loadData()">Refresh</button>
  <button onclick="logout()">Logout</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Company</th>
        <th>Amount</th>
        <th>IC</th>
        <th>IC Front</th>
        <th>IC Back</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.login = async function(){
  await signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );
  alert("Login success");
}

window.logout = async function(){
  await signOut(auth);
}

onAuthStateChanged(auth, user=>{
  if(user){
    loginBox.style.display="none";
    panel.style.display="block";
    loadData();
  } else {
    loginBox.style.display="block";
    panel.style.display="none";
  }
});

window.loadData = async function(){
  const snap = await getDocs(collection(db,"applications"));
  let html="";

  snap.forEach(doc=>{
    const d = doc.data();

    html += `
      <tr>
        <td>${d.name||""}</td>
        <td>${d.email||""}</td>
        <td>${d.phone||""}</td>
        <td>${d.company||""}</td>
        <td>${d.amount||""}</td>
        <td>${d.ic_number||""}</td>
        <td><a href="${d.ic_front}" target="_blank">View</a></td>
        <td><a href="${d.ic_back}" target="_blank">View</a></td>
      </tr>
    `;
  });

  data.innerHTML = html;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT ADMIN V8 PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="firebase.js"></script>

<style>

/* ===== BACKGROUND ===== */
body{
margin:0;
font-family:Arial;
background:url('hero-bg.jpg') no-repeat center center fixed;
background-size:cover;
display:flex;
color:white;
}

/* DARK LAYER */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.75);
display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
width:250px;
background:rgba(15,23,42,.95);
padding:20px;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo img{
width:40px;
height:40px;
border-radius:10px;
}

.logo h2{
color:#f5c542;
font-size:18px;
}

.menu div{
padding:10px;
margin:8px 0;
background:#111827;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{
background:#1f2937;
}

/* ===== MAIN ===== */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARDS */
.card{
background:rgba(17,24,39,.95);
padding:15px;
border-radius:12px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:rgba(17,24,39,.95);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #1f2937;
}

/* BUTTONS */
button{
padding:5px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{background:#16a34a;color:white;}
.reject{background:#dc2626;color:white;}

/* RISK */
.risk{
padding:4px 8px;
border-radius:6px;
}

.high{background:red;}
.mid{background:orange;}
.low{background:green;}

</style>
</head>

<body>

<div class="overlay">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="logo.png">
<h2>LION BANK</h2>
</div>

<div class="menu">
<div onclick="filter('all')">All</div>
<div onclick="filter('Pending')">Pending</div>
<div onclick="filter('Approved')">Approved</div>
<div onclick="filter('Rejected')">Rejected</div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h2>📊 Loan Applications Dashboard</h2>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tb"></tbody>

</table>

</div>

</div>

</div>

<script>

let data=[];
let chart;
let current="all";

/* ===== AUTO LOGIN ===== */
auth.signInAnonymously().then(()=>load());

/* ===== LOAD ===== */
async function load(){

const snap=await db.collection("applications").get();

data=[];
snap.forEach(d=>{
data.push({id:d.id,...d.data()});
});

render();
}

/* ===== FILTER ===== */
function filter(t){
current=t;
render();
}

/* ===== RISK ===== */
function risk(d){

if(d.risk!==undefined) return d.risk;

let r=0;
if(Number(d.amount)>5000) r+=30;
if((d.loantype||"").includes("Business")) r+=20;
if(Number(d.income||0)<3000) r+=30;

return r;
}

/* ===== RENDER ===== */
function render(){

let html="";
let p=0,a=0,r=0;

data.forEach(d=>{

let status=d.status||"Pending";
let rs=risk(d);

/* filter */
if(current!=="all" && status!==current) return;

if(status==="Pending")p++;
if(status==="Approved")a++;
if(status==="Rejected")r++;

let cls=rs>60?"high":rs>30?"mid":"low";

html+=`
<tr>
<td>${d.name||""}</td>
<td>${d.phone||""}</td>
<td>${d.amount||""}</td>
<td>${status}</td>

<td><span class="risk ${cls}">${rs}</span></td>

<td>
<button class="approve" onclick="set('${d.id}','Approved')">A</button>
<button class="reject" onclick="set('${d.id}','Rejected')">R</button>
</td>
</tr>
`;
});

tb.innerHTML=html;

draw(p,a,r);
}

/* ===== UPDATE ===== */
async function set(id,status){

await db.collection("applications").doc(id).update({
status
});

load();
}

/* ===== CHART ===== */
function draw(p,a,r){

const ctx=document.getElementById("chart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Pending","Approved","Rejected"],
datasets:[{
data:[p,a,r],
backgroundColor:["orange","green","red"]
}]
},
options:{
responsive:true
}
});

}

</script>

</body>
</html>

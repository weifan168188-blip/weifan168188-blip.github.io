<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin V8 Bank</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="firebase.js"></script>

<style>
body{margin:0;background:#0a0f1c;color:white;font-family:Arial;display:flex;}
.sidebar{width:220px;background:#111827;padding:20px;height:100vh;}
.main{flex:1;padding:20px;}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:#111827;}
td,th{padding:10px;border-bottom:1px solid #222;text-align:center;}
button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;}
.approve{background:green;color:white;}
.reject{background:red;color:white;}
.risk{padding:4px 8px;border-radius:6px;}
.high{background:red;}
.mid{background:orange;}
.low{background:green;}
</style>
</head>

<body>

<div class="sidebar">
<h3>V8 BANK</h3>
</div>

<div class="main">

<div class="card">
<h2>Applications Dashboard</h2>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Amount</th>
<th>Risk</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tb"></tbody>
</table>

</div>

<script>

let data=[];
let chart;

auth.onAuthStateChanged(u=>{
if(u) load();
});

async function load(){

const snap=await db.collection("applications")
.orderBy("created","desc")
.get();

data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));

render();
}

function render(){

let h="";
let p=0,a=0,r=0;

data.forEach(d=>{

if(d.status==="Pending")p++;
if(d.status==="Approved")a++;
if(d.status==="Rejected")r++;

let riskClass = d.risk>60?"high":d.risk>30?"mid":"low";

h+=`
<tr>
<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.amount}</td>

<td><span class="risk ${riskClass}">${d.risk}</span></td>

<td>${d.status}</td>

<td>
<button class="approve" onclick="set('${d.id}','Approved')">A</button>
<button class="reject" onclick="set('${d.id}','Rejected')">R</button>
</td>
</tr>
`;
});

tb.innerHTML=h;

draw(p,a,r);
}

async function set(id,status){

await db.collection("applications").doc(id).update({
status:status
});

await db.collection("audit_logs").add({
action:status,
id:id,
time:new Date()
});

load();
}

function draw(p,a,r){

if(chart) chart.destroy();

chart=new Chart(chartCanvas(),{
type:"bar",
data:{
labels:["Pending","Approved","Rejected"],
datasets:[{data:[p,a,r]}]
}
});
}

function chartCanvas(){
return document.getElementById("chart");
}

</script>

</body>
</html>

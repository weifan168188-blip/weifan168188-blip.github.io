<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LION CREDIT - Loan Consultation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* ===== HERO BACKGROUND ===== */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:40px;

  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
    url("https://images.unsplash.com/photo-1508964942454-1a56651d54ac?auto=format&fit=crop&w=1800&q=80");
  background-size:cover;
  background-position:center;
  color:white;
}

.logo{
  font-size:26px;
  color:#D4AF37;
  font-weight:bold;
}

h1{
  font-size:48px;
  color:#D4AF37;
  margin-top:10px;
}

.subtitle{
  margin-top:10px;
  opacity:0.85;
}

/* ===== BUTTON ===== */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 28px;
  background:linear-gradient(90deg,#D4AF37,#ffcc66);
  color:black;
  text-decoration:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover{
  transform:scale(1.03);
}

/* ===== SECTION ===== */
.section{
  padding:60px 20px;
  text-align:center;
  background:#0b0f19;
  color:white;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  display:inline-block;
  width:260px;
}

/* ===== FORM SECTION ===== */
.form-section{
  padding:60px 20px;
  background:#0f172a;
  text-align:center;
}

iframe{
  width:100%;
  max-width:800px;
  height:900px;
  border:none;
  border-radius:12px;
  background:white;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.6;
  background:#0b0f19;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<div class="logo">LION CREDIT</div>

<h1>Singapore Loan Consultation</h1>
<p class="subtitle">Fast Approval • Secure Process • No Hidden Fees</p>

<a class="btn" href="#apply">Apply Now</a>

</div>

<!-- FEATURES -->
<div class="section">

<h2>Why Choose Us</h2>

<div class="card">Fast Approval</div>
<div class="card">Secure Process</div>
<div class="card">Trusted Service</div>

</div>

<!-- GOOGLE FORM SECTION -->
<div class="form-section" id="apply">

<h2 style="color:#D4AF37;">Loan Application Form</h2>

<p style="opacity:0.7;margin-top:10px;">
Please fill in your details below
</p>

<!-- GOOGLE FORM EMBED -->
<iframe 
src="https://forms.gle/dHtDf9bpuXRDHMoQ9">
</iframe>

</div>

<footer>
© 2025 LION CREDIT. All Rights Reserved.
</footer>

</body>
</html>

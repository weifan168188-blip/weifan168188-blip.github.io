<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loan System V8</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}
.container{max-width:700px;margin:40px auto;padding:30px;background:#141b2d;border-radius:15px;}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;}
button{width:100%;padding:14px;background:#00c853;border:none;color:white;border-radius:8px;}
</style>
</head>

<body>

<div class="container">
<h2>Loan Application V8</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="income" placeholder="Income">

<select id="type">
<option>Personal</option>
<option>Business</option>
</select>

<select id="amount">
<option>1000</option>
<option>5000</option>
<option>10000</option>
</select>

<button onclick="submit()">Submit</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let lock=false;

function riskScore(data){

let score=0;
if(data.amount>5000) score+=30;
if(data.type==="Business") score+=20;
if(data.income<3000) score+=30;

return score;
}

async function submit(){

if(lock) return;
lock=true;

const data={
name: name.value,
phone: phone.value,
income: income.value,
type: type.value,
amount: amount.value,
status:"Pending",
created:firebase.firestore.FieldValue.serverTimestamp()
};

data.risk=riskScore(data);

await db.collection("applications").add(data);

alert("Submitted");

lock=false;
}

</script>

</body>
</html>

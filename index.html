<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LION CREDIT SYSTEM</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/photo-1526401485004-2aa7f3b3c3c6?auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    .overlay {
      background: rgba(0,0,0,0.75);
      min-height: 100vh;
      padding: 50px 20px;
    }

    h1 {
      font-size: 44px;
      color: gold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .box {
      background: rgba(20,20,20,0.85);
      width: 360px;
      margin: auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(90deg, #25D366, #1ebe5d);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="overlay">

  <h1>LION CREDIT</h1>
  <div class="subtitle">Loan Consultation • Fast Approval • No Hidden Fees</div>

  <div class="box">

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="email" placeholder="Email">
    <input id="company" placeholder="Company Name">
    <input id="ic" placeholder="IC Number">
    <input id="amount" placeholder="Loan Amount">

    <select id="type">
      <option>Personal Loan</option>
      <option>Business Loan</option>
      <option>Emergency Loan</option>
    </select>

    <button onclick="submitForm()">Submit Application</button>

  </div>

  <div class="footer">Secure Application System Powered by Firebase</div>

</div>

<!-- ================= FIREBASE CDN ================= -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG（已帮你整理好）
  const firebaseConfig = {
    apiKey: "AIzaSyA394LWxxX3_mjiiKQU5GIWTGrWSHmCVfU",
    authDomain: "lion-credit-system.firebaseapp.com",
    projectId: "lion-credit-system",
    storageBucket: "lion-credit-system.firebasestorage.app",
    messagingSenderId: "720399842142",
    appId: "1:720399842142:web:b2635c6228553c28eaedcf"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🚀 submit function
  function submitForm() {

    if (!document.getElementById("name").value ||
        !document.getElementById("phone").value) {
      alert("Please fill required fields");
      return;
    }

    db.collection("submissions").add({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value,
      company: document.getElementById("company").value,
      ic: document.getElementById("ic").value,
      amount: document.getElementById("amount").value,
      type: document.getElementById("type").value,
      createdAt: new Date()
    })
    .then(() => {
      alert("Application Submitted Successfully!");
      document.querySelectorAll("input").forEach(i => i.value = "");
    })
    .catch(err => {
      alert("Error: " + err.message);
    });
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LION CREDIT - System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:40px;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
url("https://images.unsplash.com/photo-1508964942454-1a56651d54ac?auto=format&fit=crop&w=1800&q=80");
background-size:cover;
background-position:center;
}

/* TITLE */
h1{
color:#D4AF37;
font-size:42px;
}

/* CARD */
.card{
margin-top:20px;
background:rgba(17,24,39,0.9);
padding:20px;
border-radius:12px;
width:100%;
max-width:500px;
backdrop-filter: blur(10px);
}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(90deg,#D4AF37,#ffcc66);
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">

<h1>LION CREDIT SYSTEM</h1>
<p>Professional Loan Application System</p>

<div class="card">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="ic" placeholder="IC Number">
<input id="company" placeholder="Company Name">
<input id="salary" placeholder="Monthly Salary">

<select id="loanType">
<option>Personal Loan</option>
<option>Business Loan</option>
</select>

<select id="amount">
<option>SGD 200 - 1,000</option>
<option>SGD 1,000 - 10,000</option>
<option>SGD 10,000 - 100,000</option>
</select>

<input type="file" id="icFront" accept="image/*">
<input type="file" id="icBack" accept="image/*">

<button onclick="submitData()">Submit Application</button>

</div>

</div>

<script>
function submitData(){
  alert("System version requires Firebase backend setup (next step).");
}
</script>

</body>
</html>

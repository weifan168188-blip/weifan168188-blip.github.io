<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LION CREDIT - Loan Consultation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  color:white;
  background:#0b0f19;
}

/* ===== HERO BACKGROUND ===== */
.hero{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
}

.logo{
  color:#D4AF37;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

h1{
  font-size:48px;
  color:#D4AF37;
}

.subtitle{
  margin-top:10px;
  opacity:0.9;
}

/* ===== FORM CARD ===== */
.card{
  margin-top:30px;
  background:rgba(17,24,39,0.9);
  padding:25px;
  border-radius:12px;
  width:100%;
  max-width:520px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

textarea{
  resize:none;
  height:80px;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  background:#D4AF37;
  border:none;
  border-radius:8px;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#e6c158;
}

/* ===== FEATURES ===== */
.features{
  display:flex;
  gap:15px;
  margin-top:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.feature{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  width:180px;
  text-align:center;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="hero">

  <div class="logo">LION CREDIT</div>

  <h1>Loan Consultation Service</h1>
  <p class="subtitle">Fast Approval • No Hidden Fees • Trusted Service</p>

  <div class="card">

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="company" placeholder="Company Name">
    <input id="address" placeholder="Company Address">
    <input id="salary" placeholder="Monthly Salary">

    <select id="loanType">
      <option>Personal Loan</option>
      <option>Business Loan</option>
    </select>

    <select id="amount">
      <option>SGD 200 - 1,000</option>
      <option>SGD 1,000 - 5,000</option>
      <option>SGD 5,000 - 10,000</option>
    </select>

    <textarea id="note" placeholder="Additional Notes (Optional)"></textarea>

    <button onclick="sendEmail()">Submit Application</button>

  </div>

  <div class="features">
    <div class="feature">Fast Approval</div>
    <div class="feature">No Hidden Fees</div>
    <div class="feature">Secure Process</div>
  </div>

</div>

<footer>
© 2025 LION CREDIT. All Rights Reserved.
</footer>

<script>
function sendEmail(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const company = document.getElementById("company").value;
  const address = document.getElementById("address").value;
  const salary = document.getElementById("salary").value;
  const loanType = document.getElementById("loanType").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  const subject = "New Loan Application - " + name;

  const body =
`NEW LOAN APPLICATION

Name: ${name}
Phone: ${phone}
Company: ${company}
Address: ${address}
Salary: ${salary}
Loan Type: ${loanType}
Amount: ${amount}
Note: ${note}`;

  window.location.href =
  "mailto:weifan168188@gmail.com" +
  "?subject=" + encodeURIComponent(subject) +
  "&body=" + encodeURIComponent(body);

}
</script>

</body>
</html>

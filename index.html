<script>

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function submitForm(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const company=document.getElementById("company").value;
const income=document.getElementById("income").value;
const icnumber=document.getElementById("icnumber").value;
const loantype=document.getElementById("loantype").value;
const amount=document.getElementById("amount").value;

if(!name || !phone || !icnumber){

alert("Please fill required fields");
return;

}

const front=document.getElementById("icFront").files[0];
const back=document.getElementById("icBack").files[0];

let frontURL="";
let backURL="";

if(front){
frontURL=await fileToBase64(front);
}

if(back){
backURL=await fileToBase64(back);
}

await db.collection("submissions").add({

name,
phone,
email,
company,
income,
icnumber,
loantype,
amount,
frontURL,
backURL,

status:"Pending",

created:new Date()

});

alert("Application Submitted Successfully");

location.reload();

}

</script>

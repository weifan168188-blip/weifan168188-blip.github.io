<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LION CREDIT</title>

<style>
body{
  font-family: Arial;
  background:#0b0f19;
  color:white;
  text-align:center;
  padding:60px;
}

h1{
  color:#D4AF37;
  font-size:42px;
}

.container{
  max-width:420px;
  margin:40px auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#25D366;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.features{
  display:flex;
  justify-content:space-around;
  margin-top:30px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>LION CREDIT</h1>
<p>Loan Consultation Service</p>

<div class="container">

<h3>Apply Now</h3>

<input id="name" placeholder="Full Name"/>
<input id="phone" placeholder="Phone Number"/>
<input id="company" placeholder="Company Name"/>
<input id="address" placeholder="Company Address"/>
<input id="salary" placeholder="Monthly Salary"/>

<select id="loanType">
  <option>Personal Loan</option>
  <option>Business Loan</option>
</select>

<select id="amount">
  <option>SGD 200 - 1,000</option>
  <option>SGD 1,000 - 5,000</option>
  <option>SGD 5,000 - 10,000</option>
</select>

<button onclick="sendEmail()">Submit via Email</button>

</div>

<div class="features">
  <div>Fast Approval</div>
  <div>No Hidden Fees</div>
  <div>Secure Service</div>
</div>

<script>
function sendEmail(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const company = document.getElementById("company").value;
  const address = document.getElementById("address").value;
  const salary = document.getElementById("salary").value;
  const loanType = document.getElementById("loanType").value;
  const amount = document.getElementById("amount").value;

  const subject = "Loan Application - " + name;

  const body =
`Name: ${name}
Phone: ${phone}
Company: ${company}
Company Address: ${address}
Salary: ${salary}
Loan Type: ${loanType}
Amount: ${amount}`;

  window.location.href =
  "mailto:your-weifan168188@gmail.com?subject=" +
  encodeURIComponent(subject) +
  "&body=" +
  encodeURIComponent(body);
}
</script>

</body>
</html>

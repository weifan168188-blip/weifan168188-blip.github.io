<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LION CREDIT SYSTEM</title>

<style>
body{
  font-family: Arial;
  background:#0b0f19;
  color:white;
  text-align:center;
  padding:40px;
}
h1{color:#F5C542;}
.container{
  max-width:500px;
  margin:auto;
  background:#111827;
  padding:20px;
  border-radius:15px;
}
input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}
.small{
  font-size:12px;
  opacity:0.7;
}
</style>

</head>

<body>

<h1>LION CREDIT</h1>
<p>Loan Consultation System</p>

<div class="container">

  <input id="name" placeholder="Full Name"/>
  <input id="phone" placeholder="Phone Number"/>
  <input id="email" placeholder="Email (optional)" value="weifan168188@gmail.com"/>

  <input id="company" placeholder="Company Name"/>
  <input id="income" placeholder="Monthly Income"/>

  <input id="icnumber" placeholder="IC Number"/>

  <select id="loantype">
    <option>Personal Loan</option>
    <option>Business Loan</option>
  </select>

  <select id="amount">
    <option>SGD 200 - 1,000</option>
    <option>SGD 1,000 - 5,000</option>
    <option>SGD 5,000 - 20,000</option>
  </select>

  <label>IC Front Image</label>
  <input type="file" id="icFront" accept="image/*"/>

  <label>IC Back Image</label>
  <input type="file" id="icBack" accept="image/*"/>

  <button onclick="submitForm()">Submit Application</button>

  <p class="small">Secure submission via Firebase</p>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA394LWxxX3_mjiiKQU5GIWTGrWSHmCVfU",
  authDomain: "lion-credit-system.firebaseapp.com",
  projectId: "lion-credit-system",
  storageBucket: "lion-credit-system.appspot.com",
  messagingSenderId: "720399842142",
  appId: "1:720399842142:web:b2635c6228553c28eaedcf"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

async function uploadFile(file, path){
  const ref = storage.ref().child(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}

async function submitForm(){

  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const email = document.getElementById('email').value;
  const company = document.getElementById('company').value;
  const income = document.getElementById('income').value;
  const icnumber = document.getElementById('icnumber').value;
  const loantype = document.getElementById('loantype').value;
  const amount = document.getElementById('amount').value;

  const icFrontFile = document.getElementById('icFront').files[0];
  const icBackFile = document.getElementById('icBack').files[0];

  if(!name || !phone || !icnumber){
    alert("Please fill required fields");
    return;
  }

  let icFrontURL = "";
  let icBackURL = "";

  if(icFrontFile){
    icFrontURL = await uploadFile(icFrontFile, "ic/front_" + Date.now());
  }

  if(icBackFile){
    icBackURL = await uploadFile(icBackFile, "ic/back_" + Date.now());
  }

  await db.collection("submissions").add({
    name,
    phone,
    email,
    company,
    income,
    icnumber,
    loantype,
    amount,
    icFrontURL,
    icBackURL,
    time: new Date()
  });

  alert("Submitted Successfully!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LION CREDIT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.72),
rgba(0,0,0,.88)
),
url('hero-bg.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
color:white;
}

.container{

width:100%;
max-width:800px;

background:rgba(15,15,15,.78);

backdrop-filter:blur(15px);

border:1px solid rgba(212,175,55,.25);

border-radius:25px;

padding:40px;

box-shadow:
0 0 40px rgba(0,0,0,.6),
0 0 30px rgba(212,175,55,.15);

}

.logoBox{
text-align:center;
margin-bottom:30px;
}

.logoBox img{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #d4af37;

box-shadow:0 0 30px rgba(212,175,55,.45);

}

.logoBox h1{

margin-top:15px;

font-size:42px;

color:#d4af37;

letter-spacing:2px;

}

.logoBox p{

margin-top:8px;

color:#ccc;

letter-spacing:4px;

font-size:13px;

}

.heroText{

text-align:center;

margin-bottom:30px;

}

.heroText h2{

font-size:34px;

line-height:1.3;

margin-bottom:10px;

}

.gold{
color:#d4af37;
}

.heroText p{

color:#ccc;

font-size:15px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

input,
select{

width:100%;

padding:14px;

background:#111;

border:1px solid #333;

color:white;

border-radius:12px;

outline:none;

font-size:15px;

}

input:focus,
select:focus{

border-color:#d4af37;

box-shadow:0 0 10px rgba(212,175,55,.4);

}

.full{
grid-column:1 / span 2;
}

label{

display:block;

margin-top:15px;
margin-bottom:8px;

color:#d4af37;

font-size:14px;

}

.filebox{

grid-column:1 / span 2;

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.upload{

background:#111;

padding:15px;

border-radius:12px;

border:1px solid #333;

}

.upload input{

border:none;

padding:0;

background:none;

}

button{

width:100%;

padding:16px;

margin-top:25px;

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:linear-gradient(
90deg,
#b8860b,
#d4af37,
#f5d76e
);

color:black;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 25px rgba(212,175,55,.5);

}

.stats{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:15px;

margin-bottom:30px;

}

.card{

background:#111;

padding:15px;

border-radius:15px;

text-align:center;

border:1px solid rgba(212,175,55,.15);

}

.card h3{

color:#d4af37;

font-size:28px;

}

.card p{

margin-top:5px;

font-size:13px;

color:#aaa;

}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.filebox{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

.logoBox h1{
font-size:32px;
}

.heroText h2{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logoBox">

<img src="logo.jpg">

<h1>LION CREDIT</h1>

<p>FINANCIAL SOLUTIONS</p>

</div>

<div class="heroText">

<h2>
FAST. SECURE.
<span class="gold">FINANCIAL FREEDOM.</span>
</h2>

<p>
Trusted by thousands. Fast approval. High success rate.
</p>

</div>

<div class="stats">

<div class="card">
<h3>10,000+</h3>
<p>Happy Clients</p>
</div>

<div class="card">
<h3>24H</h3>
<p>Fast Approval</p>
</div>

<div class="card">
<h3>98%</h3>
<p>Approval Rate</p>
</div>

</div>

<div class="grid">

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<input id="email" placeholder="Email Address">

<input id="company" placeholder="Company">

<input id="income" placeholder="Monthly Income">

<input id="icnumber" placeholder="IC Number">

<select id="loantype">

<option>Personal Loan</option>
<option>Business Loan</option>

</select>

<select id="amount">

<option>SGD 1,000</option>
<option>SGD 5,000</option>
<option>SGD 10,000</option>
<option>SGD 20,000</option>
<option>SGD 50,000</option>

</select>

<div class="filebox">

<div class="upload">

<label>IC Front</label>

<input type="file"
id="icFront"
accept="image/*">

</div>

<div class="upload">

<label>IC Back</label>

<input type="file"
id="icBack"
accept="image/*">

</div>

</div>

</div>

<button onclick="submitForm()">
SUBMIT APPLICATION
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<script>

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function submitForm(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const company=document.getElementById("company").value;
const income=document.getElementById("income").value;
const icnumber=document.getElementById("icnumber").value;
const loantype=document.getElementById("loantype").value;
const amount=document.getElementById("amount").value;

if(!name || !phone || !icnumber){

alert("Please fill required fields");

return;

}

const front=document.getElementById("icFront").files[0];
const back=document.getElementById("icBack").files[0];

let frontURL="";
let backURL="";

if(front){
frontURL=await fileToBase64(front);
}

if(back){
backURL=await fileToBase64(back);
}

await db.collection("submissions").add({

name,
phone,
email,
company,
income,
icnumber,
loantype,
amount,

frontURL,
backURL,

status:"Pending",

created:new Date()

});

alert("Application Submitted Successfully");

location.reload();

}

</script>

</body>
</html>

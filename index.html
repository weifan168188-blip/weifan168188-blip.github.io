<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT V8</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:url("hero-bg.jpg") no-repeat center/cover;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
z-index:-1;
}

/* FORM BOX */
.container{
width:430px;
background:rgba(15,23,42,.92);
backdrop-filter:blur(12px);
padding:25px;
border-radius:18px;
box-shadow:0 15px 50px rgba(0,0,0,.5);
}

/* LOGO */
.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:85px;
border-radius:12px;
}

/* TITLE */
h1{
text-align:center;
font-size:18px;
margin-bottom:15px;
color:#facc15;
font-weight:600;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin:7px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
box-sizing:border-box;
}

label{
font-size:12px;
opacity:.8;
margin-top:6px;
display:block;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#16a34a;
color:white;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#22c55e;
}

/* FILE */
input[type="file"]{
padding:10px;
background:#0f172a;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<!-- LOGO -->
<div class="logo">
<img src="logo.jpg">
</div>

<h1>LION CREDIT SYSTEM</h1>

<!-- FORM -->
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<!-- ✅ working address（补回） -->
<input id="address" placeholder="Working Address">

<input id="company" placeholder="Company">
<input id="income" placeholder="Monthly Income">
<input id="icnumber" placeholder="IC Number">

<select id="loantype">
<option>Personal Loan</option>
<option>Business Loan</option>
</select>

<select id="amount">
<option>SGD 1,000</option>
<option>SGD 5,000</option>
<option>SGD 10,000</option>
<option>SGD 20,000</option>
<option>SGD 50,000</option>
</select>

<label>IC Front</label>
<input type="file" id="icFront" accept="image/*">

<label>IC Back</label>
<input type="file" id="icBack" accept="image/*">

<button onclick="submitForm()">Submit Application</button>

</div>

<script>

/* base64 */
function fileToBase64(file){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.onerror=rej;
r.readAsDataURL(file);
});
}

/* submit */
async function submitForm(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const address=document.getElementById("address").value;
const company=document.getElementById("company").value;
const income=document.getElementById("income").value;
const icnumber=document.getElementById("icnumber").value;
const loantype=document.getElementById("loantype").value;
const amount=document.getElementById("amount").value;

if(!name || !phone || !icnumber){
alert("Please fill required fields");
return;
}

const front=document.getElementById("icFront").files[0];
const back=document.getElementById("icBack").files[0];

let frontURL="",backURL="";

if(front) frontURL=await fileToBase64(front);
if(back) backURL=await fileToBase64(back);

/* FIRESTORE SAVE */
await db.collection("submissions").add({
name,
phone,
email,
address,   // ✅ working address
company,
income,
icnumber,
loantype,
amount,
frontURL,
backURL,
status:"Pending",
created:new Date()
});

alert("Application Submitted Successfully");
location.reload();
}

</script>

</body>
</html>

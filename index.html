<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT SYSTEM V8</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url('hero-bg.jpg') no-repeat center/cover;
color:white;
}

.overlay{
background:rgba(0,0,0,.7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{text-align:center;color:#f5c542}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h1>🦁 LION CREDIT</h1>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="company" placeholder="Company">
<input id="income" placeholder="Income">
<input id="icnumber" placeholder="IC Number">

<select id="loantype">
<option>Personal Loan</option>
<option>Business Loan</option>
</select>

<select id="amount">
<option>1000</option>
<option>5000</option>
<option>10000</option>
<option>20000</option>
</select>

<label>IC Front</label>
<input type="file" id="front">

<label>IC Back</label>
<input type="file" id="back">

<button onclick="submit()">SUBMIT</button>

</div>

</div>

<script>

function toBase64(file){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.onerror=rej;
r.readAsDataURL(file);
});
}

async function submit(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const ic=document.getElementById("icnumber").value;

if(!name || !phone || !ic){
alert("Fill required fields");
return;
}

let front=document.getElementById("front").files[0];
let back=document.getElementById("back").files[0];

let frontURL=front?await toBase64(front):"";
let backURL=back?await toBase64(back):"";

await db.collection("applications").add({
name,
phone,
email:document.getElementById("email").value,
company:document.getElementById("company").value,
income:document.getElementById("income").value,
icnumber:ic,
loantype:document.getElementById("loantype").value,
amount:document.getElementById("amount").value,

frontURL,
backURL,

status:"Pending",
risk:Math.floor(Math.random()*100),

created:new Date()
});

alert("Submitted!");
location.reload();
}

</script>

</body>
</html>

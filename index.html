<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LION CREDIT SYSTEM</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f19;
color:white;
}

.container{
max-width:700px;
margin:50px auto;
padding:30px;
background:#141b2d;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:30px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
box-sizing:border-box;
}

label{
display:block;
margin-top:15px;
}

button{
width:100%;
padding:15px;
background:#00c853;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<h1>🦁 LION CREDIT SYSTEM</h1>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<input id="email" placeholder="Email">

<input id="company" placeholder="Company">

<input id="income" placeholder="Monthly Income">

<input id="icnumber" placeholder="IC Number">

<select id="loantype">
<option>Personal Loan</option>
<option>Business Loan</option>
</select>

<select id="amount">
<option>SGD 1,000</option>
<option>SGD 5,000</option>
<option>SGD 10,000</option>
<option>SGD 20,000</option>
<option>SGD 50,000</option>
</select>

<label>IC Front</label>
<input type="file" id="icFront" accept="image/*">

<label>IC Back</label>
<input type="file" id="icBack" accept="image/*">

<button onclick="submitForm()">
Submit Application
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<script>

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function submitForm(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const company=document.getElementById("company").value;
const income=document.getElementById("income").value;
const icnumber=document.getElementById("icnumber").value;
const loantype=document.getElementById("loantype").value;
const amount=document.getElementById("amount").value;

if(!name || !phone || !icnumber){
alert("Please fill required fields");
return;
}

const front=document.getElementById("icFront").files[0];
const back=document.getElementById("icBack").files[0];

let frontURL="";
let backURL="";

if(front){
frontURL=await fileToBase64(front);
}

if(back){
backURL=await fileToBase64(back);
}

await db.collection("submissions").add({

name,
phone,
email,
company,
income,
icnumber,
loantype,
amount,

frontURL,
backURL,

status:"Pending",

created:new Date()

});

alert("Application Submitted Successfully");

location.reload();

}

</script>

</body>
</html>

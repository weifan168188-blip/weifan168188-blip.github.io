<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LION CREDIT - Singapore Loan Service</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:white;
}

/* ===== BACKGROUND HERO ===== */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:40px;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1508964942454-1a56651d54ac?auto=format&fit=crop&w=1800&q=80");
  background-size:cover;
  background-position:center;
}

/* subtle glow animation */
@keyframes glow {
  0% { text-shadow: 0 0 10px #D4AF37; }
  50% { text-shadow: 0 0 25px #D4AF37; }
  100% { text-shadow: 0 0 10px #D4AF37; }
}

.logo{
  font-size:26px;
  color:#D4AF37;
  font-weight:bold;
}

h1{
  font-size:52px;
  color:#D4AF37;
  margin-top:10px;
  animation: glow 3s infinite;
}

.subtitle{
  margin-top:10px;
  opacity:0.85;
}

/* ===== FORM ===== */
.card{
  margin-top:30px;
  width:100%;
  max-width:520px;
  background:rgba(15,23,42,0.85);
  padding:25px;
  border-radius:14px;
  backdrop-filter: blur(12px);
  box-shadow:0 0 30px rgba(212,175,55,0.2);
  border:1px solid rgba(212,175,55,0.2);
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

textarea{
  height:80px;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  background:linear-gradient(90deg,#D4AF37,#ffcc66);
  border:none;
  border-radius:8px;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* ===== FEATURES ===== */
.features{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:30px;
}

.feature{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:10px;
  width:180px;
  border:1px solid rgba(255,255,255,0.08);
}

/* floating light effect */
.glow-dot{
  position:absolute;
  width:8px;
  height:8px;
  background:#D4AF37;
  border-radius:50%;
  box-shadow:0 0 15px #D4AF37;
  animation: float 6s infinite;
}

@keyframes float{
  0%{ transform:translateY(0); opacity:0.6;}
  50%{ transform:translateY(-20px); opacity:1;}
  100%{ transform:translateY(0); opacity:0.6;}
}

footer{
  margin-top:40px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="hero">

  <div class="logo">LION CREDIT</div>

  <h1>Singapore Loan Consultation</h1>
  <p class="subtitle">Fast Approval • Secure Process • Trusted Financial Service</p>

  <div class="card">

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="company" placeholder="Company Name">
    <input id="address" placeholder="Company Address">
    <input id="salary" placeholder="Monthly Salary (SGD)">

    <select id="loanType">
      <option>Personal Loan</option>
      <option>Business Loan</option>
    </select>

    <select id="amount">
      <option>SGD 200 - 1,000</option>
      <option>SGD 1,000 - 5,000</option>
      <option>SGD 5,000 - 10,000</option>
    </select>

    <textarea id="note" placeholder="Additional Notes"></textarea>

    <button onclick="sendEmail()">Submit Application</button>

  </div>

  <div class="features">
    <div class="feature">Fast Approval</div>
    <div class="feature">No Hidden Fees</div>
    <div class="feature">Secure Process</div>
  </div>

  <footer>
    © 2025 LION CREDIT • Singapore Financial Service
  </footer>

</div>

<script>
function sendEmail(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const company = document.getElementById("company").value;
  const address = document.getElementById("address").value;
  const salary = document.getElementById("salary").value;
  const loanType = document.getElementById("loanType").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  const subject = "Singapore Loan Application - " + name;

  const body =
`NEW APPLICATION

Name: ${name}
Phone: ${phone}
Company: ${company}
Address: ${address}
Salary: ${salary}
Loan Type: ${loanType}
Amount: ${amount}
Note: ${note}`;

  window.location.href =
  "mailto:weifan168188@gmail.com"
  + "?subject=" + encodeURIComponent(subject)
  + "&body=" + encodeURIComponent(body);
}
</script>

</body>
</html>
